spring:
    datasource:
        url: jdbc:h2:mem:velocity;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
        driverClassName: org.h2.Driver
        username: sa
        password:
    jpa:
        hibernate:
            ddl-auto: create-drop
    properties:
        hibernate:
            jdbc:
                time_zone: UTC
    open-in-view: false

logging:
    level:
        root: INFO
        com.example.velocity: DEBUG